<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        fieldset {
            max-width: 300px;
        }

        legend {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="sxmas">
            <label for="sxmas">Masculino</label> <br>

            <input type="radio" name="sexo" id="sxfem" checked>
            <label for="sxfem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <p>
                <input type="checkbox" name="esfut" id="iesfut" checked> <label for="iesfut">Futebol</label> <br>

                <input type="checkbox" name="esvol" id="iesvol"> <label for="iesvol">Volêi</label> <br>

                <input type="checkbox" name="esbas" id="iesbas"> <label for="iesbas">Basquete</label> <br>

                <input type="checkbox" name="esque" id="iesque"> <label for="iesque">Queimada</label> <br>

                <input type="checkbox" name="esbea" id="iesbea"> <label for="iesbea">Beach Tennis</label> <br>
            </p>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
